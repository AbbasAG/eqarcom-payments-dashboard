<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — EQARCOM Digital Payments</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0f172a; color: #e2e8f0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .auth-card {
      background: #1e293b; border: 1px solid #2d4060; border-radius: 16px;
      padding: 48px 40px; max-width: 420px; width: 100%; text-align: center;
    }
    .auth-logo {
      max-width: 200px; margin: 0 auto 12px; display: block;
      filter: brightness(0) invert(1);
    }
    .auth-title { font-size: 16px; font-weight: 600; color: #94a3b8; margin-bottom: 32px; }
    .form-group { margin-bottom: 18px; text-align: left; }
    .form-group label {
      display: block; font-size: 12px; font-weight: 600; color: #94a3b8;
      margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .form-group input {
      width: 100%; padding: 11px 16px; background: #0f172a;
      border: 1px solid #334155; border-radius: 8px; color: #e2e8f0;
      font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.15s;
    }
    .form-group input:focus { border-color: #357296; }
    .auth-btn {
      width: 100%; padding: 12px; background: #10455F; color: #e2e8f0;
      border: none; border-radius: 8px; font-family: inherit; font-size: 14px;
      font-weight: 600; cursor: pointer; margin-top: 8px; transition: background 0.15s;
    }
    .auth-btn:hover { background: #357296; }
    .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-error {
      background: rgba(127,29,29,0.25); border: 1px solid rgba(185,28,28,0.35);
      border-radius: 8px; padding: 10px 14px; color: #fca5a5; font-size: 13px;
      margin-bottom: 16px; display: none; text-align: left;
    }
    .auth-link { margin-top: 24px; font-size: 13px; color: #64748b; }
    .auth-link a { color: #6FB1C9; text-decoration: none; font-weight: 500; }
    .auth-link a:hover { text-decoration: underline; }

  </style>
</head>
<body>

  <div class="auth-card">
    <img src="logo.png" alt="EQARCOM" class="auth-logo">
    <div class="auth-title">EQARCOM Usage Dashboards</div>

    <div class="auth-error" id="error-msg"></div>

    <form id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required autocomplete="email" placeholder="you@company.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required autocomplete="current-password" placeholder="Enter your password">
      </div>
      <button type="submit" class="auth-btn" id="login-btn">Login</button>
    </form>

    <p class="auth-link">First time? <a href="register.html">Register here</a></p>
    <p class="auth-link" style="margin-top:12px;">Need access? Contact <a href="mailto:support@eqarcom.ae">support@eqarcom.ae</a></p>
  </div>

  <script type="module">
    import { auth, db, onAuthStateChanged, signInWithEmailAndPassword, signOut, doc, getDoc } from './firebase-init.js';

    // If already logged in, go straight to dashboard
    onAuthStateChanged(auth, function(user) {
      if (user) window.location.href = 'dashboard.html';
    });

    var errorEl = document.getElementById('error-msg');
    var loginBtn = document.getElementById('login-btn');

    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      errorEl.style.display = 'none';
      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in\u2026';

      var email = document.getElementById('email').value.trim().toLowerCase();
      var password = document.getElementById('password').value;

      try {
        var cred = await signInWithEmailAndPassword(auth, email, password);
        // Check if user is enabled in Firestore
        var userDoc = await getDoc(doc(db, 'users', email));
        if (!userDoc.exists() || !userDoc.data().enabled) {
          await signOut(auth);
          errorEl.textContent = 'Your account has been disabled. Contact your administrator.';
          errorEl.style.display = 'block';
          loginBtn.disabled = false;
          loginBtn.textContent = 'Login';
          return;
        }
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorEl.textContent = 'Invalid email or password.';
        errorEl.style.display = 'block';
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
      }
    });
  </script>
</body>
</html>
