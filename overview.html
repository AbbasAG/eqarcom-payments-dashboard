<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Management Overview — EQARCOM Digital Payments</title>
<script src="eqarat_data.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  min-height: 100vh;
}

/* ── Auth gate ── */
body:not(.authenticated) .header,
body:not(.authenticated) .tab-nav,
body:not(.authenticated) .main { visibility: hidden; }

/* ── Header ── */
.header {
  background: linear-gradient(135deg, #0c3248 0%, #10455F 50%, #1e3a5f 100%);
  padding: 28px 40px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid #1e4060;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.header-badge {
  background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px; padding: 8px 14px;
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #6FB1C9;
}
.header-title { font-size: 22px; font-weight: 800; color: #f1f5f9; letter-spacing: -0.5px; }
.header-actions { display: flex; align-items: center; gap: 12px; }
.header-right { font-size: 12px; color: #4a7a96; }
.header-admin-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px; background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2); border-radius: 8px;
  color: #6FB1C9; text-decoration: none; font-size: 12px; font-weight: 600;
  transition: background 0.15s;
}
.header-admin-btn:hover { background: rgba(255,255,255,0.18); }
.header-logout-btn {
  padding: 7px 14px; background: rgba(127,29,29,0.25);
  border: 1px solid rgba(185,28,28,0.35); border-radius: 8px;
  color: #fca5a5; font-size: 12px; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: background 0.15s;
}
.header-logout-btn:hover { background: rgba(127,29,29,0.4); }

/* ── Tab navigation ── */
.tab-nav {
  display: flex; gap: 0; margin-bottom: 0;
  border-bottom: 1px solid #2d4060; background: #0f172a; padding: 0 28px;
}
.tab-link {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 14px 24px; font-size: 13px; font-weight: 600; font-family: inherit;
  color: #64748b; text-decoration: none;
  border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s;
}
.tab-link:hover { color: #94a3b8; }
.tab-link.active { color: #6FB1C9; border-bottom-color: #6FB1C9; }

/* ── Main ── */
.main { max-width: 1400px; margin: 0 auto; padding: 32px 28px 60px; }

/* ── Filters ── */
.filters-bar {
  background: #1e293b; border: 1px solid #2d4060; border-radius: 16px;
  padding: 18px 24px; margin-bottom: 28px;
  display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
}
.filter-group { display: flex; align-items: center; gap: 8px; }
.filter-group label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #64748b; }
.filter-group select {
  background: #0f172a; border: 1px solid #334155; color: #e2e8f0;
  padding: 8px 12px; border-radius: 8px; font-size: 13px; font-family: inherit;
  min-width: 180px; cursor: pointer; outline: none; transition: border-color 0.15s;
}
.filter-group select:focus { border-color: #357296; }
.reset-btn {
  background: transparent; border: 1px solid #334155; color: #64748b;
  padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 600;
  font-family: inherit; cursor: pointer; transition: all .2s;
}
.reset-btn:hover { border-color: #357296; color: #e2e8f0; }

/* ── Dashboard content ── */
.dashboard { display: flex; flex-direction: column; gap: 24px; }

/* KPI Cards */
.kpi-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
.kpi-card { background: #1e293b; border: 1px solid #2d4060; border-radius: 12px; padding: 20px 24px; transition: all .2s; }
.kpi-card:hover { border-color: #357296; transform: translateY(-1px); }
.kpi-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #64748b; margin-bottom: 8px; }
.kpi-value { font-size: 28px; font-weight: 800; letter-spacing: -1px; color: #f1f5f9; }
.kpi-sub { display: flex; gap: 20px; margin-top: 10px; }
.kpi-sub-item { font-size: 13px; color: #64748b; }
.kpi-sub-item span { font-weight: 700; }
.kpi-sub-item.res span { color: #60a5fa; }
.kpi-sub-item.com span { color: #fbbf24; }

/* Section */
.section { background: #1e293b; border: 1px solid #2d4060; border-radius: 12px; overflow: hidden; }
.section-header { padding: 16px 24px; border-bottom: 1px solid #2d4060; display: flex; align-items: center; justify-content: space-between; }
.section-title { font-size: 15px; font-weight: 700; color: #f1f5f9; }
.section-badge { font-size: 11px; padding: 3px 10px; border-radius: 12px; font-weight: 600; }
.badge-res { background: rgba(59,130,246,0.15); color: #60a5fa; }
.badge-com { background: rgba(251,191,36,0.15); color: #fbbf24; }

/* Tables */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #172033; padding: 10px 16px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #64748b; border-bottom: 1px solid #2d4060; white-space: nowrap; }
td { padding: 10px 16px; border-bottom: 1px solid #1a2438; white-space: nowrap; }
tr:hover td { background: rgba(53,114,150,0.06); }
td.num { text-align: right; font-variant-numeric: tabular-nums; }
th.num { text-align: right; }

.clickable { cursor: pointer; color: #6FB1C9; text-decoration: underline; text-decoration-style: dotted; transition: color .15s; }
.clickable:hover { color: #fff; }
.clickable-zero { color: #475569; }

/* Occupancy bar */
.occ-bar-wrap { display: flex; align-items: center; gap: 8px; min-width: 120px; }
.occ-bar { flex: 1; height: 8px; background: #172033; border-radius: 4px; overflow: hidden; }
.occ-bar-fill { height: 100%; border-radius: 4px; transition: width .3s; }
.occ-pct { font-size: 12px; font-weight: 700; min-width: 42px; text-align: right; }

/* Drill-down */
.drill-down { display: none; background: #172033; border-top: 2px solid #357296; }
.drill-down.active { display: block; }
.drill-header { padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #2d4060; }
.drill-header h3 { font-size: 14px; font-weight: 700; }
.drill-close { background: transparent; border: 1px solid #334155; color: #64748b; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-family: inherit; }
.drill-close:hover { border-color: #ef4444; color: #fca5a5; }

/* Charts area */
.charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.chart-card { background: #1e293b; border: 1px solid #2d4060; border-radius: 12px; padding: 20px 24px; }
.chart-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; color: #f1f5f9; }

/* Bar chart */
.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.bar-label { font-size: 12px; color: #94a3b8; min-width: 140px; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-track { flex: 1; height: 22px; background: #172033; border-radius: 4px; overflow: hidden; position: relative; }
.bar-fill { height: 100%; border-radius: 4px; transition: width .4s; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; }
.bar-val { font-size: 11px; font-weight: 600; color: #fff; white-space: nowrap; }
.bar-val-outside { font-size: 11px; font-weight: 600; color: #94a3b8; margin-left: 6px; white-space: nowrap; }

/* Subtype grid */
.subtype-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(140px,1fr)); gap: 10px; }
.subtype-item { background: #172033; border: 1px solid #2d4060; border-radius: 8px; padding: 14px; text-align: center; }
.subtype-count { font-size: 22px; font-weight: 800; }
.subtype-label { font-size: 11px; color: #94a3b8; margin-top: 4px; }
.subtype-rent { font-size: 11px; color: #4ade80; margin-top: 2px; }
.subtype-area { font-size: 11px; color: #22d3ee; margin-top: 2px; }

/* Scrollable drill */
.drill-table-wrap { max-height: 350px; overflow-y: auto; }
.drill-table-wrap::-webkit-scrollbar { width: 6px; }
.drill-table-wrap::-webkit-scrollbar-track { background: #0f172a; }
.drill-table-wrap::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

/* Responsive */
@media (max-width: 1200px) { .kpi-row { grid-template-columns: repeat(2, 1fr); } .charts-row { grid-template-columns: 1fr; } }
@media (max-width: 768px) { .kpi-row { grid-template-columns: 1fr; } }

/* Portrait warning */
.portrait-warning {
  display: none; position: fixed; inset: 0; z-index: 9999;
  background: #0f172a; align-items: center; justify-content: center;
  flex-direction: column; text-align: center; padding: 40px;
  font-family: 'Inter', system-ui, sans-serif; color: #e2e8f0;
}
.portrait-warning svg { width: 64px; height: 64px; margin-bottom: 24px; color: #6FB1C9; }
.portrait-warning h2 { font-size: 20px; font-weight: 700; margin-bottom: 12px; }
.portrait-warning p { font-size: 14px; color: #94a3b8; max-width: 300px; line-height: 1.5; }
@media screen and (max-width: 767px) and (orientation: portrait) {
  .portrait-warning { display: flex !important; }
}
</style>
</head>
<body>

<!-- Portrait warning -->
<div class="portrait-warning">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="4" y="2" width="16" height="20" rx="2" ry="2" transform="rotate(90 12 12)"/>
    <path d="M12 18h.01"/>
  </svg>
  <h2>Please rotate your device</h2>
  <p>This dashboard is optimised for landscape viewing. Please rotate your device to landscape mode.</p>
</div>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="header-badge">EQARCOM</div>
    <div>
      <div class="header-title">EQARCOM Usage Dashboards</div>
    </div>
  </div>
  <div class="header-actions">
    <span class="header-right" id="data-timestamp"></span>
    <a href="admin.html" id="admin-link" class="header-admin-btn" style="display:none;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Users
    </a>
    <button id="logout-btn" class="header-logout-btn">Logout</button>
  </div>
</div>

<!-- Tab navigation -->
<div class="tab-nav">
  <a href="dashboard.html" id="payments-tab" class="tab-link">Payments</a>
  <a href="service-bookings.html" id="bookings-tab" class="tab-link">Service Bookings</a>
  <a href="overview.html" class="tab-link active">Management Overview</a>
</div>

<div class="main">
  <div class="filters-bar">
    <div class="filter-group">
      <label>Property</label>
      <select id="filterProperty"><option value="">All Properties</option></select>
    </div>
    <div class="filter-group">
      <label>Usage Type</label>
      <select id="filterUsage">
        <option value="">All</option>
        <option value="Residential">Residential</option>
        <option value="Commercial">Commercial</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Owner</label>
      <select id="filterOwner"><option value="">All Owners</option></select>
    </div>
    <button class="reset-btn" onclick="resetFilters()">Reset Filters</button>
  </div>

  <div class="dashboard" id="dashboard"></div>
</div>

<script>
const TODAY = new Date();
const MS_DAY = 86400000;
const resUnitTypes = new Set(['Apartment', 'Villa']);
const comUnitTypes = new Set(['Retail', 'Office', 'Building', 'Shop']);

function daysDiff(dateStr) {
  return Math.floor((new Date(dateStr) - TODAY) / MS_DAY);
}

function fmt(n) {
  if (n == null) return '-';
  return Number(n).toLocaleString('en-US');
}

function fmtCurrency(n) {
  if (n == null) return '-';
  return 'AED ' + Number(n).toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0});
}

function fmtArea(n) {
  if (n == null || n === 0) return '-';
  return Number(n).toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0}) + ' sq.ft';
}

function pct(n, d) {
  if (!d) return '0.0';
  return ((n / d) * 100).toFixed(1);
}

function occColor(p) {
  if (p >= 90) return '#4ade80';
  if (p >= 70) return '#fbbf24';
  return '#f87171';
}

function normBedroom(b) {
  if (!b) return 'Unknown';
  const s = String(b).trim();
  if (/studio/i.test(s)) return 'Studio';
  if (/^1BR/i.test(s)) return '1 Bed';
  if (/^2BR/i.test(s)) return '2 Beds';
  if (/^3BR/i.test(s)) return '3 Beds';
  if (/^4BR/i.test(s)) return '4 Beds';
  if (/^5BR/i.test(s)) return '5 Beds';
  return s;
}

let filters = { property: '', usage: '', owner: '' };

function initFilters() {
  const propSel = document.getElementById('filterProperty');
  const ownerSel = document.getElementById('filterOwner');
  EQARAT_DATA.properties.forEach(p => {
    propSel.innerHTML += `<option value="${p}">${p}</option>`;
  });
  EQARAT_DATA.owners.forEach(o => {
    ownerSel.innerHTML += `<option value="${o}">${o}</option>`;
  });
}

function applyFilters() {
  filters.property = document.getElementById('filterProperty').value;
  filters.usage = document.getElementById('filterUsage').value;
  filters.owner = document.getElementById('filterOwner').value;
  render();
}

function resetFilters() {
  document.getElementById('filterProperty').value = '';
  document.getElementById('filterUsage').value = '';
  document.getElementById('filterOwner').value = '';
  filters = { property: '', usage: '', owner: '' };
  render();
}

function getFilteredData() {
  let units = EQARAT_DATA.units;
  let leases = EQARAT_DATA.leases;

  if (filters.property) {
    units = units.filter(u => u.property === filters.property);
    leases = leases.filter(l => l.property === filters.property);
  }
  if (filters.usage) {
    units = units.filter(u => u.usage_type === filters.usage);
    leases = leases.filter(l => l.usage_type === filters.usage);
  }
  if (filters.owner) {
    leases = leases.filter(l => l.owner === filters.owner);
    const leasedCodes = new Set(leases.map(l => l.unit_code));
    units = units.filter(u => leasedCodes.has(u.unit_code) || !filters.owner);
  }

  return { units, leases };
}

function render() {
  const { units, leases } = getFilteredData();
  const activeLeases = leases.filter(l => l.status === 'Active');
  const db = document.getElementById('dashboard');

  let html = '';

  // --- KPI Row ---
  const totalUnits = units.length;
  const resUnits = units.filter(u => u.usage_type === 'Residential').length;
  const comUnits = units.filter(u => u.usage_type === 'Commercial').length;

  const totalRent = activeLeases.reduce((s, l) => s + (l.annual_rent || 0), 0);
  const resRent = activeLeases.filter(l => l.usage_type === 'Residential').reduce((s, l) => s + (l.annual_rent || 0), 0);
  const comRent = activeLeases.filter(l => l.usage_type === 'Commercial').reduce((s, l) => s + (l.annual_rent || 0), 0);

  const totalArea = activeLeases.reduce((s, l) => s + (l.built_up_area || 0), 0);
  const resArea = activeLeases.filter(l => l.usage_type === 'Residential').reduce((s, l) => s + (l.built_up_area || 0), 0);
  const comArea = activeLeases.filter(l => l.usage_type === 'Commercial').reduce((s, l) => s + (l.built_up_area || 0), 0);

  const occupiedUnits = units.filter(u => u.status === 'Occupied').length;
  const occPct = pct(occupiedUnits, totalUnits);
  const resOcc = units.filter(u => u.usage_type === 'Residential');
  const resOccupied = resOcc.filter(u => u.status === 'Occupied').length;
  const comOcc = units.filter(u => u.usage_type === 'Commercial');
  const comOccupied = comOcc.filter(u => u.status === 'Occupied').length;

  html += `<div class="kpi-row">
    <div class="kpi-card">
      <div class="kpi-label">Total Units</div>
      <div class="kpi-value">${fmt(totalUnits)}</div>
      <div class="kpi-sub">
        <div class="kpi-sub-item res"><span>${fmt(resUnits)}</span> Residential</div>
        <div class="kpi-sub-item com"><span>${fmt(comUnits)}</span> Commercial</div>
      </div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Total Rent Pool (Active Leases)</div>
      <div class="kpi-value" style="color:#4ade80">${fmtCurrency(totalRent)}</div>
      <div class="kpi-sub">
        <div class="kpi-sub-item res"><span>${fmtCurrency(resRent)}</span> Residential</div>
        <div class="kpi-sub-item com"><span>${fmtCurrency(comRent)}</span> Commercial</div>
      </div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Total Area Leased (Active)</div>
      <div class="kpi-value" style="color:#22d3ee">${fmtArea(totalArea)}</div>
      <div class="kpi-sub">
        <div class="kpi-sub-item res"><span>${fmtArea(resArea)}</span> Residential</div>
        <div class="kpi-sub-item com"><span>${fmtArea(comArea)}</span> Commercial</div>
      </div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Overall Occupancy</div>
      <div class="kpi-value" style="color:${occColor(parseFloat(occPct))}">${occPct}%</div>
      <div class="kpi-sub">
        <div class="kpi-sub-item res"><span>${pct(resOccupied, resOcc.length)}%</span> Residential</div>
        <div class="kpi-sub-item com"><span>${pct(comOccupied, comOcc.length)}%</span> Commercial</div>
      </div>
    </div>
  </div>`;

  // --- Subtype splits ---
  function subtypeGrid(arr, color, showArea) {
    const bedMap = {};
    arr.forEach(l => {
      const b = color === '#60a5fa' ? normBedroom(l.bedrooms) : (l.bedrooms || l.unit_type || 'Other');
      if (!bedMap[b]) bedMap[b] = { count:0, rent:0, area:0 };
      bedMap[b].count++;
      bedMap[b].rent += (l.annual_rent || 0);
      bedMap[b].area += (l.built_up_area || 0);
    });
    let h = '';
    Object.entries(bedMap).sort((a,b) => b[1].count - a[1].count).forEach(([bed, d]) => {
      h += `<div class="subtype-item">
        <div class="subtype-count" style="color:${color}">${d.count}</div>
        <div class="subtype-label">${bed}</div>
        <div class="subtype-rent">${fmtCurrency(d.rent)}</div>
        ${showArea ? `<div class="subtype-area">${fmtArea(d.area)}</div>` : ''}
      </div>`;
    });
    return h;
  }

  const resLeased = activeLeases.filter(l => l.usage_type === 'Residential');
  const resUTG = {};
  resLeased.forEach(l => { const ut = l.unit_type || 'Other'; if (!resUTG[ut]) resUTG[ut] = []; resUTG[ut].push(l); });
  html += `<div class="charts-row">`;
  Object.entries(resUTG).sort((a,b) => b[1].length - a[1].length).forEach(([ut, arr]) => {
    html += `<div class="chart-card"><div class="chart-title">${ut} Leased Units by Subtype <span style="color:#60a5fa;font-size:13px;margin-left:8px">(${arr.length} units)</span></div><div class="subtype-grid">${subtypeGrid(arr, '#60a5fa', false)}</div></div>`;
  });
  html += `</div>`;

  const comLeased = activeLeases.filter(l => l.usage_type === 'Commercial');
  const comUTG = {};
  comLeased.forEach(l => { const ut = l.unit_type || 'Other'; if (!comUTG[ut]) comUTG[ut] = []; comUTG[ut].push(l); });
  html += `<div class="charts-row">`;
  Object.entries(comUTG).sort((a,b) => b[1].length - a[1].length).forEach(([ut, arr]) => {
    html += `<div class="chart-card"><div class="chart-title">${ut} Leased Units by Subtype <span style="color:#fbbf24;font-size:13px;margin-left:8px">(${arr.length} units)</span></div><div class="subtype-grid">${subtypeGrid(arr, '#fbbf24', true)}</div></div>`;
  });
  html += `</div>`;

  // --- Occupancy by Property ---
  const propMap = {};
  units.forEach(u => {
    if (!propMap[u.property]) propMap[u.property] = { total:0, occupied:0, resTot:0, resOcc:0, comTot:0, comOcc:0, resRent:0, comRent:0 };
    propMap[u.property].total++;
    if (u.status === 'Occupied') propMap[u.property].occupied++;
    if (u.usage_type === 'Residential') { propMap[u.property].resTot++; if (u.status === 'Occupied') propMap[u.property].resOcc++; }
    else { propMap[u.property].comTot++; if (u.status === 'Occupied') propMap[u.property].comOcc++; }
  });
  activeLeases.forEach(l => {
    if (propMap[l.property]) {
      if (l.usage_type === 'Residential') propMap[l.property].resRent += (l.annual_rent || 0);
      else propMap[l.property].comRent += (l.annual_rent || 0);
    }
  });

  const propEntries = Object.entries(propMap).sort((a, b) => b[1].total - a[1].total);
  html += `<div class="section"><div class="section-header"><div class="section-title">Occupancy by Property</div></div><div class="table-wrap"><table>
    <tr><th>Property</th><th class="num">Total Units</th><th>Occupancy</th><th class="num">Res. Units</th><th class="num">Res. Occ%</th><th class="num">Res. Rent</th><th class="num">Com. Units</th><th class="num">Com. Occ%</th><th class="num">Com. Rent</th></tr>`;
  propEntries.forEach(([prop, d]) => {
    const op = pct(d.occupied, d.total);
    const rp = pct(d.resOcc, d.resTot);
    const cp = pct(d.comOcc, d.comTot);
    html += `<tr>
      <td><strong>${prop}</strong></td><td class="num">${d.total}</td>
      <td><div class="occ-bar-wrap"><div class="occ-bar"><div class="occ-bar-fill" style="width:${op}%;background:${occColor(parseFloat(op))}"></div></div><div class="occ-pct" style="color:${occColor(parseFloat(op))}">${op}%</div></div></td>
      <td class="num">${d.resTot}</td><td class="num" style="color:#60a5fa">${rp}%</td><td class="num">${fmtCurrency(d.resRent)}</td>
      <td class="num">${d.comTot}</td><td class="num" style="color:#fbbf24">${cp}%</td><td class="num">${fmtCurrency(d.comRent)}</td></tr>`;
  });
  html += `</table></div></div>`;

  // --- Active Leases Overview ---
  ['Residential', 'Commercial'].forEach(uType => {
    const badge = uType === 'Residential' ? 'badge-res' : 'badge-com';
    const sectionId = uType.toLowerCase();
    const targetTypes = uType === 'Residential' ? resUnitTypes : comUnitTypes;
    const filtered = leases.filter(l => targetTypes.has(l.unit_type));

    const propLeases = {};
    filtered.forEach(l => { if (!propLeases[l.property]) propLeases[l.property] = []; propLeases[l.property].push(l); });

    function bucketize(arr) {
      const buckets = { total:arr.length, expired:0, d30:0, d60:0, d90:0, d120:0 };
      arr.forEach(l => {
        const dd = daysDiff(l.end_date);
        if (dd < 0) buckets.expired++;
        else if (dd <= 30) buckets.d30++;
        else if (dd <= 60) buckets.d60++;
        else if (dd <= 90) buckets.d90++;
        else if (dd <= 120) buckets.d120++;
      });
      return buckets;
    }

    const propRows = Object.entries(propLeases).sort((a,b) => b[1].length - a[1].length);
    const allBuckets = bucketize(filtered);

    html += `<div class="section" id="section-${sectionId}"><div class="section-header"><div class="section-title">Active Leases Overview</div><div class="section-badge ${badge}">${uType}</div></div><div class="table-wrap"><table>
      <tr><th>Property</th><th class="num">Total Leased</th><th class="num">Expiring 120d</th><th class="num">Expiring 90d</th><th class="num">Expiring 60d</th><th class="num">Expiring 30d</th><th class="num">Expired</th></tr>`;

    function cellClick(prop, bucket, type) { return `onclick="showDrill('${type}','${prop.replace(/'/g,"\\'")}','${bucket}')" class="clickable"`; }
    function cellVal(val, prop, bucket, type) {
      if (val === 0) return `<td class="num clickable-zero">0</td>`;
      return `<td class="num" ${cellClick(prop, bucket, type)}>${val}</td>`;
    }

    propRows.forEach(([prop, arr]) => {
      const b = bucketize(arr);
      html += `<tr><td><strong>${prop}</strong></td>${cellVal(b.total, prop, 'total', sectionId)}${cellVal(b.d120, prop, 'd120', sectionId)}${cellVal(b.d90, prop, 'd90', sectionId)}${cellVal(b.d60, prop, 'd60', sectionId)}${cellVal(b.d30, prop, 'd30', sectionId)}${cellVal(b.expired, prop, 'expired', sectionId)}</tr>`;
    });
    html += `<tr style="background:#172033;font-weight:700"><td>TOTAL</td>${cellVal(allBuckets.total, 'ALL', 'total', sectionId)}${cellVal(allBuckets.d120, 'ALL', 'd120', sectionId)}${cellVal(allBuckets.d90, 'ALL', 'd90', sectionId)}${cellVal(allBuckets.d60, 'ALL', 'd60', sectionId)}${cellVal(allBuckets.d30, 'ALL', 'd30', sectionId)}${cellVal(allBuckets.expired, 'ALL', 'expired', sectionId)}</tr>`;
    html += `</table></div><div class="drill-down" id="drill-${sectionId}"></div></div>`;
  });

  // --- Nationality Split ---
  const natMap = {};
  activeLeases.forEach(l => { const n = l.nationality || 'Not Specified'; natMap[n] = (natMap[n] || 0) + 1; });
  const natEntries = Object.entries(natMap).sort((a,b) => b[1] - a[1]);
  const maxNat = natEntries.length ? natEntries[0][1] : 1;
  const natTotal = activeLeases.length;

  html += `<div class="section"><div class="section-header"><div class="section-title">Nationality Split - Active Tenants</div></div><div style="padding:20px 24px; max-height:400px; overflow-y:auto;">`;
  natEntries.forEach(([nat, count]) => {
    const w = (count / maxNat) * 100;
    const p = ((count / natTotal) * 100).toFixed(1);
    html += `<div class="bar-row"><div class="bar-label">${nat}</div><div class="bar-track"><div class="bar-fill" style="width:${w}%;background:#357296"><span class="bar-val">${w > 18 ? count + ' (' + p + '%)' : ''}</span></div></div>${w <= 18 ? `<span class="bar-val-outside">${count} (${p}%)</span>` : ''}</div>`;
  });
  html += `</div></div>`;

  db.innerHTML = html;
  document.getElementById('data-timestamp').textContent = 'Data as of ' + TODAY.toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'});
}

// Drill-down
window.showDrill = function(type, property, bucket) {
  const { leases } = getFilteredData();
  const targetTypes = type === 'residential' ? resUnitTypes : comUnitTypes;
  let filtered = leases.filter(l => targetTypes.has(l.unit_type));
  if (property !== 'ALL') filtered = filtered.filter(l => l.property === property);

  let bucketLabel = '';
  if (bucket === 'total') { bucketLabel = 'All Leases'; }
  else if (bucket === 'expired') { filtered = filtered.filter(l => daysDiff(l.end_date) < 0); bucketLabel = 'Expired'; }
  else if (bucket === 'd30') { filtered = filtered.filter(l => { const d = daysDiff(l.end_date); return d >= 0 && d <= 30; }); bucketLabel = 'Expiring in 30 days'; }
  else if (bucket === 'd60') { filtered = filtered.filter(l => { const d = daysDiff(l.end_date); return d > 30 && d <= 60; }); bucketLabel = 'Expiring in 31-60 days'; }
  else if (bucket === 'd90') { filtered = filtered.filter(l => { const d = daysDiff(l.end_date); return d > 60 && d <= 90; }); bucketLabel = 'Expiring in 61-90 days'; }
  else if (bucket === 'd120') { filtered = filtered.filter(l => { const d = daysDiff(l.end_date); return d > 90 && d <= 120; }); bucketLabel = 'Expiring in 91-120 days'; }

  const drillEl = document.getElementById('drill-' + type);
  let h = `<div class="drill-header"><h3>${property === 'ALL' ? 'All Properties' : property} - ${bucketLabel} (${filtered.length} leases)</h3><button class="drill-close" onclick="closeDrill('${type}')">Close</button></div>
  <div class="drill-table-wrap"><table>
    <tr><th>Unit Code</th><th>Tenant</th><th>Unit Type</th><th>Subtype</th><th class="num">Annual Rent</th><th>Start Date</th><th>End Date</th><th class="num">Days Left</th><th>Nationality</th><th>Contract Type</th><th>Ejari No</th></tr>`;

  filtered.sort((a,b) => new Date(a.end_date) - new Date(b.end_date)).forEach(l => {
    const dd = daysDiff(l.end_date);
    const ddColor = dd < 0 ? '#f87171' : dd <= 30 ? '#fbbf24' : dd <= 90 ? '#22d3ee' : '#e2e8f0';
    h += `<tr><td>${l.unit_code || '-'}</td><td>${l.tenant || '-'}</td><td>${l.unit_type || '-'}</td><td>${l.bedrooms || '-'}</td><td class="num">${fmtCurrency(l.annual_rent)}</td><td>${l.start_date || '-'}</td><td>${l.end_date || '-'}</td><td class="num" style="color:${ddColor};font-weight:700">${dd}</td><td>${l.nationality || '-'}</td><td>${l.contract_type || '-'}</td><td style="font-size:11px">${l.ejari_no || '-'}</td></tr>`;
  });
  h += `</table></div>`;
  drillEl.innerHTML = h;
  drillEl.classList.add('active');
  drillEl.scrollIntoView({ behavior:'smooth', block:'nearest' });
};

window.closeDrill = function(type) {
  const el = document.getElementById('drill-' + type);
  el.classList.remove('active');
  el.innerHTML = '';
};

initFilters();
document.getElementById('filterProperty').addEventListener('change', applyFilters);
document.getElementById('filterUsage').addEventListener('change', applyFilters);
document.getElementById('filterOwner').addEventListener('change', applyFilters);
render();
</script>

<!-- Firebase auth guard -->
<script type="module">
  import { auth, db, onAuthStateChanged, signOut, doc, getDoc, updateDoc } from './firebase-init.js';

  document.getElementById('logout-btn').addEventListener('click', function() {
    this.disabled = true;
    signOut(auth).then(function() { window.location.href = 'index.html'; });
  });

  onAuthStateChanged(auth, async function(user) {
    if (!user) { window.location.href = 'index.html'; return; }
    try {
      var email = user.email.toLowerCase();
      var userDoc = await getDoc(doc(db, 'users', email));
      if (!userDoc.exists() || !userDoc.data().enabled) {
        await signOut(auth);
        window.location.href = 'index.html';
        return;
      }
      var userData = userDoc.data();

      // Check managementDashboard permission
      if (!userData.managementDashboard && !userData.isAdmin) {
        window.location.href = 'dashboard.html';
        return;
      }

      if (userData.isAdmin) {
        document.getElementById('admin-link').style.display = 'inline-flex';
      }
      // Hide Payments/Service Bookings tabs for overview-only users
      var noOrgs = Array.isArray(userData.allowedOrgs) && userData.allowedOrgs.length === 0;
      if (!userData.isAdmin && noOrgs) {
        document.getElementById('payments-tab').style.display = 'none';
        document.getElementById('bookings-tab').style.display = 'none';
      }
      document.body.classList.add('authenticated');
      updateDoc(doc(db, 'users', email), { lastVisited: new Date().toISOString() }).catch(function(){});
    } catch (e) {
      console.error('Auth check failed:', e);
      await signOut(auth);
      window.location.href = 'index.html';
    }
  });
</script>
